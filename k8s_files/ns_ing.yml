# ---------------------------------------------
# Namespace
# ---------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: nani

# ---------------------------------------------
# Ingress
# ---------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libapp-ingress
  namespace: nani
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
