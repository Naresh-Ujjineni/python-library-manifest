#------------------
#Statefulset
#----------------
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: nani
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: nareshujjineni/flm0307:dbimage
          ports:
            - containerPort: 3306
          envFrom:
            - configMapRef:
                name: libapp-config
            - secretRef:
                name: libapp-sc
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html/
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

#---------------
#Auth Deployment
#---------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: nani
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: nareshujjineni/flm0307:authimage
          ports:
            - containerPort: 5001
          env:
            - name: confcon
              valueFrom:
                configMapKeyRef:
                  name: libapp-config
                  key: NameCon
            - name: confipl2
              valueFrom:
                configMapKeyRef:
                  name: libapp-config
                  key: IPL5
            - name: secrcon
              valueFrom:
                secretKeyRef:
                  name: libapp-sc
                  key: NameSC
            - name: secripl
              valueFrom:
                secretKeyRef:
                  name: libapp-sc
                  key: IPL2
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
#----------
#Book
#----------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: book
  namespace: nani
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
    spec:
      containers:
        - name: book
          image: nareshujjineni/flm0307:bookimage
          ports:
            - containerPort: 5002
          resources:
            requests:
              cpu: "50m"       # Minimum guaranteed CPU
              memory: "128Mi"   # Minimum guaranteed memory
            limits:
              cpu: "100m"       # Maximum CPU allowed
              memory: "256Mi"   # Maximum memory allowed
