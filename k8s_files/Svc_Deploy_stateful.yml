#-------
#Frontend
#--------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nani
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nareshujjineni/flm0307:appimage1
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: libapp-config
            - secretRef:
                name: libapp-sc
          livenessProbe:
            exec:
              command:
                - cat
                - /app/app.py
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: "50m"       # Minimum guaranteed CPU
              memory: "128Mi"   # Minimum guaranteed memory
            limits:
              cpu: "100m"       # Maximum CPU allowed
              memory: "256Mi"   # Maximum memory allowed

