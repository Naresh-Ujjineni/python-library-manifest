spec:
  selector:
    app: book
  ports:
    - port: 5002
      targetPort: 5002

---

apiVersion: v1
kind: Service
metadata:
  name: borrow-service
  namespace: nani
spec:
  selector:
    app: borrow
  ports:
    - port: 5003
      targetPort: 5003

---

apiVersion: v1
